seed: 42

data:
  labels_csv: /kaggle/input/competitions/rsna-intracranial-aneurysm-detection/train.csv
  series_root: /kaggle/input/competitions/rsna-intracranial-aneurysm-detection/series
  cache_dir: /kaggle/working/rsna_cache_smoke
  max_series: 20
  val_size: 0.25
  sampling_strategy: balanced

preprocessing:
  target_spacing: 1.0
  final_size: [96, 96, 96]
  hu_window: [-100.0, 700.0]

training:
  model_name: resnet3d18
  n_folds: 3
  batch_size: 1
  epochs: 2
  learning_rate: 0.0003
  weight_decay: 0.0001
  patience: 2
  num_workers: 2
  use_amp: true

outputs:
  output_dir: /kaggle/working/outputs
  best_checkpoint: /kaggle/working/outputs/best_resnet3d_smoke.pth
  torchscript_model: /kaggle/working/outputs/resnet3d_model_smoke.pt
  metrics_csv: /kaggle/working/outputs/training_metrics_smoke.csv
